<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>每日 AI 推荐</title>
    <link rel="stylesheet" href="./assets/app.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <span class="eyebrow">AI Article Daily</span>
        <h1>每天挑出最值得看的 AI 内容</h1>
        <p>聚合高质量官方来源，筛掉价值不高的内容，把值得读的 AI 文章整理成一份可浏览的每日精选。</p>
        <nav class="tabs" aria-label="主导航">
          <a href="./index.html" aria-current="page">首页</a>
          <a href="./archive.html">历史归档</a>
        </nav>
      </header>
      <section class="hero-card hero-grid">
        <article class="card card-featured">
          <h2>今日推荐</h2>
          <div id="today-article"></div>
        </article>
        <aside class="card spotlight-card">
          <span class="eyebrow">Spotlight</span>
          <h2>近期值得关注</h2>
          <p class="meta">优先展示近期、官方、值得优先阅读的内容。</p>
          <div id="spotlight-list" class="list compact-list"></div>
          <p id="spotlight-empty" class="empty-state" hidden>当前没有额外的近期重点内容。</p>
        </aside>
      </section>
      <section>
        <div class="section-heading">
          <span class="eyebrow">More</span>
          <h2>更多文章</h2>
        </div>
        <section class="filter-bar">
          <label class="filter-field">
            <span>搜索</span>
            <input id="article-search" type="search" placeholder="搜索标题或摘要…" />
          </label>
          <label class="filter-field">
            <span>主题</span>
            <select id="article-theme-filter">
              <option value="">全部主题</option>
            </select>
          </label>
          <label class="filter-field">
            <span>来源</span>
            <select id="article-source-filter">
              <option value="">全部来源</option>
            </select>
          </label>
        </section>
        <div class="filter-toolbar">
          <div id="article-active-filters" class="badge-group active-filters"></div>
          <button id="article-reset-filters" type="button" class="ghost-button" hidden>清空筛选</button>
        </div>
        <p id="article-result-count" class="meta"></p>
        <div id="article-list" class="list"></div>
        <p id="article-empty" class="empty-state" hidden>没有找到符合条件的文章。</p>
      </section>
    </main>
    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
