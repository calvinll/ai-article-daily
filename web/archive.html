<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>每日 AI 推荐 · 历史归档</title>
    <link rel="stylesheet" href="./assets/app.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <span class="eyebrow">Archive</span>
        <h1>历史归档</h1>
        <p>回看之前推荐过哪些文章，以及它们对应的来源和时间。</p>
        <nav class="tabs" aria-label="主导航">
          <a href="./index.html">首页</a>
          <a href="./archive.html" aria-current="page">历史归档</a>
        </nav>
      </header>
      <section class="filter-bar">
        <label class="filter-field">
          <span>搜索</span>
          <input id="history-search" type="search" placeholder="搜索标题…" />
        </label>
        <label class="filter-field">
          <span>主题</span>
          <select id="history-theme-filter">
            <option value="">全部主题</option>
          </select>
        </label>
        <label class="filter-field">
          <span>状态</span>
          <select id="history-status-filter">
            <option value="">全部状态</option>
            <option value="success">已收录</option>
            <option value="failed">处理失败</option>
            <option value="skipped">已跳过</option>
          </select>
        </label>
      </section>
      <div class="filter-toolbar">
        <div id="history-active-filters" class="badge-group active-filters"></div>
        <button id="history-reset-filters" type="button" class="ghost-button" hidden>清空筛选</button>
      </div>
      <p id="history-result-count" class="meta"></p>
      <section id="history-list" class="archive-groups"></section>
      <p id="history-empty" class="empty-state" hidden>没有找到符合条件的历史记录。</p>
    </main>
    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
